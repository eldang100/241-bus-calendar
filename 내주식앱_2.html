html,body{height:100%;background:#1a1f2e;overscroll-behavior:none}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;color:#e8ecf4;max-width:480px;margin:0 auto;position:relative;overflow-x:hidden}
#app{display:flex;flex-direction:column;height:100dvh;height:100vh}
#header{background:linear-gradient(180deg,#252d45,#1e2438);border-bottom:1px solid #2d3550;flex-shrink:0;padding:env(safe-area-inset-top,0) 0 0}
#tab-content{flex:1;overflow-y:auto;padding:14px 14px 24px;-webkit-overflow-scrolling:touch}

.tab-btn{flex:1;padding:9px 4px;background:none;border:none;color:#6b7a9e;font-size:11px;font-weight:500;cursor:pointer;border-radius:10px 10px 0 0;position:relative;transition:all 0.18s}
.tab-btn.active{background:#4a7cdc;color:#fff;font-weight:700}


.tab-btn.hot.active{background:linear-gradient(135deg,#7c3aed,#f59e0b);color:#fff}
.tab-btn.news.active{background:linear-gradient(135deg,#0f4c75,#1b6ca8);color:#fff}
.tab-btn.ai.active{background:linear-gradient(135deg,#3b1f6e,#6d3fa8);color:#fff}
.tab-btn.fng.active{background:linear-gradient(135deg,#7f1d1d,#dc2626);color:#fff}
.tab-btn .badge{position:absolute;top:4px;right:calc(50% - 16px);width:7px;height:7px;background:#f87171;border-radius:50%;animation:pulse 1.5s infinite}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.live-dot{width:6px;height:6px;background:#34d399;border-radius:50%;animation:pulse 1.5s infinite;display:inline-block;margin-right:5px}
::-webkit-scrollbar{width:0}
input{-webkit-appearance:none;border-radius:12px}
button{-webkit-appearance:none}
.card{background:#242b40;border-radius:14px;border:1px solid #2d3550;overflow:hidden;margin-bottom:10px}

.overlay{position:fixed;inset:0;background:rgba(8,10,20,0.88);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.sheet{background:#1a1f2e;border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:92dvh;max-height:92vh;overflow-y:auto;border:1px solid #2d3550;border-bottom:none;padding-bottom:env(safe-area-inset-bottom,16px)}

<script>
// ── Data ──────────────────────────────────────────────────────────────────
const API = "https://my-stock-api.eldang100.workers.dev/ai";
const STOCK_API = "https://my-stock-api.eldang100.workers.dev";
const STOCKS = {
  "005930":{"name":"삼성전자",         "price":340000,  "change":0,"sector":"반도체"},
  "000660":{"name":"SK하이닉스",       "price":1900000, "change":0,"sector":"반도체"},
  "035420":{"name":"NAVER",            "price":250000,  "change":0,"sector":"IT"},
  "035720":{"name":"카카오",           "price":55000,   "change":0,"sector":"IT"},
  "051910":{"name":"LG화학",           "price":280000,  "change":0,"sector":"화학"},
  "006400":{"name":"삼성SDI",          "price":380000,  "change":0,"sector":"배터리"},
  "207940":{"name":"삼성바이오로직스", "price":850000,  "change":0,"sector":"바이오"},
  "068270":{"name":"셀트리온",         "price":200000,  "change":0,"sector":"바이오"},
  "105560":{"name":"KB금융",           "price":100000,  "change":0,"sector":"금융"},
  "055550":{"name":"신한지주",         "price":60000,   "change":0,"sector":"금융"},
  "000270":{"name":"기아",             "price":120000,  "change":0,"sector":"자동차"},
  "005380":{"name":"현대차",           "price":300000,  "change":0,"sector":"자동차"},
};
const HOT_POOL=[
  {sector:"자동차",reason:"전기차 수출 호조 + 미국 관세 완화 기대감",theme:"🚗 EV 수출 모멘텀",color:"#f59e0b"},
  {sector:"반도체",reason:"HBM4 수요 급증 + 엔비디아 실적 서프라이즈",theme:"💾 HBM 슈퍼사이클",color:"#60a5fa"},
  {sector:"바이오",reason:"FDA 신약 승인 기대 + 글로벌 기술 이전 계약",theme:"💊 신약 모멘텀",color:"#34d399"},
  {sector:"IT",reason:"AI 서비스 가입자 급증 + 광고 매출 서프라이즈",theme:"🤖 AI 플랫폼 성장",color:"#a78bfa"},
];
const SECTOR_META={
  "반도체":{icon:"💾",color:"#60a5fa",leaders:["005930","000660"],roles:{"005930":"대장주·시총1위","000660":"주도주·HBM핵심"},catalyst:"HBM4 수요 급증"},
  "IT":{icon:"🤖",color:"#a78bfa",leaders:["035420","035720"],roles:{"035420":"대장주·AI검색","035720":"주도주·AI메신저"},catalyst:"AI MAU 급등"},
  "자동차":{icon:"🚗",color:"#f59e0b",leaders:["000270","005380"],roles:{"000270":"대장주·EV수출1위","005380":"주도주·프리미엄EV"},catalyst:"관세완화+EV회복"},
  "바이오":{icon:"💊",color:"#34d399",leaders:["207940","068270"],roles:{"207940":"대장주·CMO글로벌","068270":"주도주·FDA승인"},catalyst:"신약승인+기술이전"},
  "금융":{icon:"🏦",color:"#fbbf24",leaders:["105560","055550"],roles:{"105560":"대장주·NIM최고치","055550":"주도주·비은행확대"},catalyst:"금리안정+대출성장"},
  "화학":{icon:"⚗️",color:"#f472b6",leaders:["051910"],roles:{"051910":"대장주·배터리소재"},catalyst:"배터리소재 수요회복"},
  "배터리":{icon:"🔋",color:"#fb923c",leaders:["006400"],roles:{"006400":"대장주·전고체선도"},catalyst:"전고체배터리 양산"},
};

// ── State ─────────────────────────────────────────────────────────────────
let state = {
  tab: "watchlist",
  watchlist: ["005930","000660","035420","035720"],
  liveFlux: {},
  realPrices: {},
  supplyData: {},
  searchQ: "",
  showSearch: false,
  selectedCode: null,
  selectedSector: null,
  aiStock: null, aiResult: "", aiLoading: false,
  newsItems: [], newsLoading: false, newsError: "", newsLastFetch: null, newsVisited: false,
  newsTab: "korea",
  usNewsItems: [], usNewsLoading: false, usNewsError: "", usNewsLastFetch: null,
  expandedNews: null, expandedUsNews: null,
  modalChartAI: "", modalChartLoading: false,
  sectorAI: "", sectorAILoading: false,
  volRank: Object.keys(STOCKS).map(c=>({code:c,vol:Math.random()*100+10})).sort((a,b)=>b.vol-a.vol),
  hotSector: HOT_POOL[new Date().getDate()%HOT_POOL.length],
  lastFetchTime: null,
};

// ── Helpers ───────────────────────────────────────────────────────────────
const fmt = v => Math.round(v).toLocaleString("ko-KR");
const fmtPct = v => (v>0?"+":"")+v.toFixed(2)+"%";
const livePrice = c => state.realPrices[c]?.price || STOCKS[c]?.price || 0;
const liveChange = c => state.realPrices[c]?.change_pct || STOCKS[c]?.change || 0;
const liveVol = c => { const r=state.volRank.find(v=>v.code===c); return r?(r.vol*(1+(state.liveFlux[c]||0)*2)).toFixed(1):"0"; };

function rng(s){let x=Math.sin(s)*10000;return x-Math.floor(x);}
function genCandles(basePrice,seed){
  const candles=[]; let price=basePrice*(0.92+rng(seed)*0.08);
  const now=new Date();
  for(let i=13;i>=0;i--){
    const d=new Date(now);d.setDate(d.getDate()-i);
    if(d.getDay()===0||d.getDay()===6)continue;
    const vol=0.015+rng(seed+i*7)*0.02;
    const open=price,close=open*(1+(rng(seed+i*3)-0.48)*vol*2);
    const high=Math.max(open,close)*(1+rng(seed+i*11)*vol*0.5);
    const low=Math.min(open,close)*(1-rng(seed+i*13)*vol*0.5);
    candles.push({open,close,high,low,label:`${d.getMonth()+1}/${d.getDate()}`});
    price=close;
  }
  return candles;
}
function computeLevels(candles){
  const sh=[...candles.map(c=>c.high)].sort((a,b)=>b-a);
  const sl=[...candles.map(c=>c.low)].sort((a,b)=>a-b);
  const closes=candles.map(c=>c.close);
  return{resistance1:sh[0],resistance2:sh.find(h=>h<sh[0]*0.993)||sh[0]*0.995,
    support1:sl[0],support2:sl.find(l=>l>sl[0]*1.003)||sl[0]*1.005,
    ma10:closes.reduce((a,b)=>a+b,0)/closes.length};
}
function computeRSI(candles,period=14){
  const closes=candles.map(c=>c.close);
  if(closes.length<period+1)return closes.map(()=>50);
  const ch=closes.slice(1).map((v,i)=>v-closes[i]);
  const vals=new Array(period).fill(null);
  let ag=ch.slice(0,period).filter(v=>v>0).reduce((a,b)=>a+b,0)/period;
  let al=Math.abs(ch.slice(0,period).filter(v=>v<0).reduce((a,b)=>a+b,0))/period;
  vals.push(100-100/(1+(al===0?100:ag/al)));
  for(let i=period;i<ch.length;i++){
    const g=Math.max(ch[i],0),l=Math.abs(Math.min(ch[i],0));
    ag=(ag*(period-1)+g)/period;al=(al*(period-1)+l)/period;
    vals.push(100-100/(1+(al===0?100:ag/al)));
  }
  return vals;
}
function getRsiSignal(rsi){
  if(rsi===null)return null;
  if(rsi>=70)return{label:"과매수",color:"#f87171",bg:"rgba(248,113,113,0.12)",icon:"🔴",badge:"SELL"};
  if(rsi>=60)return{label:"강세",color:"#fb923c",bg:"rgba(251,146,60,0.10)",icon:"🟠",badge:"HOLD↑"};
  if(rsi>=40)return{label:"중립",color:"#94a3b8",bg:"rgba(148,163,184,0.08)",icon:"⚪",badge:"WATCH"};
  if(rsi>=30)return{label:"약세",color:"#60a5fa",bg:"rgba(96,165,250,0.10)",icon:"🔵",badge:"HOLD↓"};
  return{label:"과매도",color:"#34d399",bg:"rgba(52,211,153,0.12)",icon:"🟢",badge:"BUY"};
}

function addWatch(code){if(!state.watchlist.includes(code))state.watchlist=[...state.watchlist,code];}
function removeWatch(code){state.watchlist=state.watchlist.filter(c=>c!==code);}
function inWatch(code){return state.watchlist.includes(code);}

// ── 실시간 주가 fetch (KIS API) - 순차 호출 ──────────────────────────────
async function fetchRealPrices(codes) {
  for (const code of codes) {
    try {
      const d = await fetch(`${STOCK_API}/?symbol=${code}`).then(r=>r.json());
      const basePrice = STOCKS[code]?.price || 0;
      // 기준가 대비 20% ~ 500% 범위만 유효한 값으로 인정
      const isValid = d.price > 0
        && d.price > basePrice * 0.2
        && d.price < basePrice * 5;
      if (isValid) {
        state.realPrices[code] = {...d, code};
        STOCKS[code].price = d.price;
      }
    } catch(e) {}
    await new Promise(r => setTimeout(r, 300));
  }
  state.lastFetchTime = new Date();
}

// 수급 시뮬레이션 (KIS 무료 API는 수급 미제공)
function tickSupply() {
  const supply = {};
  Object.keys(STOCKS).forEach(code => {
    const h = code.split("").reduce((a,c)=>a+c.charCodeAt(0),0);
    const seed = {foreign:30+(h%40), institution:10+((h*3)%30)};
    const fp = seed.foreign+(Math.random()-0.5)*4;
    const ip = seed.institution+(Math.random()-0.5)*3;
    supply[code] = {
      foreign:     {pct:fp,               net:(Math.random()-0.42)*800},
      institution: {pct:ip,               net:(Math.random()-0.48)*400},
      individual:  {pct:Math.max(100-fp-ip,5), net:(Math.random()-0.5)*500},
    };
  });
  state.supplyData = supply;
}

// 초기 로드
tickSupply();
fetchRealPrices(Object.keys(STOCKS)).then(()=>render());

// 3분마다 실시간 갱신 (토큰 알림 최소화)
setInterval(async () => {
  await fetchRealPrices(state.watchlist.length > 0 ? state.watchlist : Object.keys(STOCKS));
  tickSupply();
  render();
  const el = document.getElementById("last-update");
  if(el && state.lastFetchTime) el.textContent = `${state.lastFetchTime.getHours()}:${String(state.lastFetchTime.getMinutes()).padStart(2,"0")}:${String(state.lastFetchTime.getSeconds()).padStart(2,"0")} 갱신`;
}, 180000);

// 수급만 5초마다 갱신
setInterval(()=>{ tickSupply(); render(); }, 5000);

// ── 넥스트 장 정보 (초단위 카운트다운) ──────────────────────────────────────
function updateSessionBar() {
  // 한국 시간 직접 계산
  const now = new Date();
  const KST = new Date(now.toLocaleString("en-US", {timeZone: "Asia/Seoul"}));
  const h = KST.getHours(), m = KST.getMinutes(), s = KST.getSeconds(), day = KST.getDay();
  const totalSec = h*3600 + m*60 + s;

  const PRE_OPEN  = 8*3600+30*60;   // 08:30 장전 동시호가
  const OPEN      = 9*3600;          // 09:00 정규장
  const CLOSE     = 15*3600+30*60;  // 15:30 장마감
  const POST_CLOSE= 16*3600;         // 16:00 장후 동시호가 종료
  const isWeekend = day===0||day===6;

  const iconEl  = document.getElementById("session-icon");
  const labelEl = document.getElementById("session-label");
  const timeEl  = document.getElementById("session-time");
  const nextEl  = document.getElementById("next-session-info");
  const barEl   = document.getElementById("next-session-bar");
  if (!iconEl) return;

  // 디버깅용 - KST 시간 확인
  console.log(`KST: ${h}:${m}:${s} day:${day} totalSec:${totalSec}`);

  function countdown(targetSec) {
    const diff = targetSec - totalSec;
    const hh = Math.floor(diff/3600);
    const mm = Math.floor((diff%3600)/60);
    const ss = diff%60;
    if(hh>0) return `${hh}시간 ${mm}분 ${ss}초`;
    if(mm>0) return `${mm}분 ${ss}초`;
    return `${ss}초`;
  }

  // 미국 장 상태 계산 (ET = KST - 14시간, 서머타임 고려 근사)
  const etHour = ((h - 14) + 24) % 24;
  const usOpen  = etHour >= 9.5 && etHour < 16;
  const usLabel = usOpen ? "🇺🇸 미증시 개장중" : "🇺🇸 미증시 마감";
  const usColor = usOpen ? "#60a5fa" : "#4a5568";

  if (isWeekend) {
    iconEl.textContent  = "🌙";
    labelEl.textContent = day===6 ? "토요일 — 장 휴장" : "일요일 — 장 휴장";
    labelEl.style.color = "#6b7a9e";
    timeEl.textContent  = usLabel;
    timeEl.style.color  = usColor;
    nextEl.textContent  = "월요일 08:30 동시호가";
    barEl.style.borderColor = "#2d3550";
  } else if (totalSec < PRE_OPEN) {
    iconEl.textContent  = "🌅";
    labelEl.textContent = "장 준비중";
    labelEl.style.color = "#fbbf24";
    timeEl.textContent  = `동시호가까지 ${countdown(PRE_OPEN)}`;
    timeEl.style.color  = "#fbbf24";
    nextEl.textContent  = "08:30 장전 동시호가";
    barEl.style.borderColor = "#fbbf2455";
  } else if (totalSec < OPEN) {
    iconEl.textContent  = "⚡";

}

// ── SVG Chart ─────────────────────────────────────────────────────────────
function svgChart(candles,levels,currentPrice,rsiValues){
  const W=420,CTOP=0,CH=124,RTOP=140,RH=60,TOTAL=210,PL=8,PR=60;
  const drawW=W-PL-PR;
  const allP=[...candles.flatMap(c=>[c.high,c.low]),levels.resistance1,levels.support1,currentPrice];
  const minP=Math.min(...allP)*0.998,maxP=Math.max(...allP)*1.002,priceRange=maxP-minP;
  const py=p=>CTOP+CH-((p-minP)/priceRange)*CH;
  const n=candles.length,cw=Math.max(4,(drawW/n)*0.55),step=drawW/n;
  const cx=i=>PL+step*i+step/2;
  const ry=v=>RTOP+RH-(v/100)*RH;
  const validRsi=rsiValues.filter(v=>v!==null);
  const latestRsi=validRsi[validRsi.length-1];
  const rsiColor=latestRsi>=70?"#f87171":latestRsi<=30?"#34d399":"#a78bfa";
  const rsiPts=rsiValues.map((v,i)=>v!==null?`${cx(i)},${ry(v)}`:null).filter(Boolean).join(" ");
  const rsiArea=(()=>{const pts=rsiValues.map((v,i)=>v!==null?{x:cx(i),y:ry(v)}:null).filter(Boolean);return pts.length>1?`M${pts[0].x},${ry(50)} ${pts.map(p=>`L${p.x},${p.y}`).join(" ")} L${pts[pts.length-1].x},${ry(50)} Z`:"";})();
  let s=`<svg width="100%" viewBox="0 0 ${W} ${TOTAL}" style="display:block">`;
  // grid
  [0.25,0.5,0.75].forEach(g=>s+=`<line x1="${PL}" y1="${py(minP+priceRange*g)}" x2="${W-PR}" y2="${py(minP+priceRange*g)}" stroke="#2d3a52" stroke-width="1" stroke-dasharray="3,3"/>`);
  // R/S lines
  s+=`<line x1="${PL}" y1="${py(levels.resistance1)}" x2="${W-PR}" y2="${py(levels.resistance1)}" stroke="#f87171" stroke-width="1.2" stroke-dasharray="5,3"/>`;
  s+=`<text x="${W-PR+3}" y="${py(levels.resistance1)+4}" fill="#f87171" font-size="8" font-weight="700">R1</text>`;
  s+=`<text x="${W-PR+3}" y="${py(levels.resistance1)+13}" fill="#f87171" font-size="7">${fmt(levels.resistance1)}</text>`;
  s+=`<line x1="${PL}" y1="${py(levels.resistance2)}" x2="${W-PR}" y2="${py(levels.resistance2)}" stroke="#fca5a5" stroke-width="0.8" stroke-dasharray="3,4" opacity="0.6"/>`;
  s+=`<text x="${W-PR+3}" y="${py(levels.resistance2)+4}" fill="#fca5a5" font-size="7" opacity="0.7">R2</text>`;
  s+=`<line x1="${PL}" y1="${py(levels.support1)}" x2="${W-PR}" y2="${py(levels.support1)}" stroke="#34d399" stroke-width="1.2" stroke-dasharray="5,3"/>`;
  s+=`<text x="${W-PR+3}" y="${py(levels.support1)+4}" fill="#34d399" font-size="8" font-weight="700">S1</text>`;
  s+=`<text x="${W-PR+3}" y="${py(levels.support1)+13}" fill="#34d399" font-size="7">${fmt(levels.support1)}</text>`;
  s+=`<line x1="${PL}" y1="${py(levels.support2)}" x2="${W-PR}" y2="${py(levels.support2)}" stroke="#6ee7b7" stroke-width="0.8" stroke-dasharray="3,4" opacity="0.6"/>`;
  s+=`<text x="${W-PR+3}" y="${py(levels.support2)+4}" fill="#6ee7b7" font-size="7" opacity="0.7">S2</text>`;
  // MA10
  s+=`<polyline points="${candles.map((c,i)=>`${cx(i)},${py(c.close)}`).join(" ")}" fill="none" stroke="#fbbf24" stroke-width="1.2" opacity="0.7"/>`;
  // Candles
  candles.forEach((c,i)=>{
    const isUp=c.close>=c.open,color=isUp?"#34d399":"#f87171";
    const rv=rsiValues[i],isExt=rv!==null&&(rv>=70||rv<=30);
    if(isExt)s+=`<rect x="${cx(i)-cw}" y="${CTOP}" width="${cw*2}" height="${CH}" fill="${rv>=70?"rgba(248,113,113,0.06)":"rgba(52,211,153,0.06)"}"/>`;
    const bt=py(Math.max(c.open,c.close)),bb=py(Math.min(c.open,c.close));
    s+=`<line x1="${cx(i)}" y1="${py(c.high)}" x2="${cx(i)}" y2="${py(c.low)}" stroke="${color}" stroke-width="1"/>`;
    s+=`<rect x="${cx(i)-cw/2}" y="${bt}" width="${cw}" height="${Math.max(bb-bt,1)}" fill="${color}" rx="1"/>`;
  });
  // Current price
  s+=`<line x1="${PL}" y1="${py(currentPrice)}" x2="${W-PR}" y2="${py(currentPrice)}" stroke="#60a5fa" stroke-width="1" stroke-dasharray="2,2" opacity="0.9"/>`;
  s+=`<text x="${W-PR+3}" y="${py(currentPrice)+4}" fill="#60a5fa" font-size="7.5" font-weight="700">현재</text>`;
  // Separator + RSI label
  s+=`<line x1="${PL}" y1="${RTOP-8}" x2="${W-PR}" y2="${RTOP-8}" stroke="#1e2d4a" stroke-width="1"/>`;
  s+=`<text x="${PL}" y="${RTOP-1}" fill="#6b7a9e" font-size="8" font-weight="600">RSI(14)</text>`;
  // RSI BG
  s+=`<rect x="${PL}" y="${RTOP}" width="${drawW}" height="${RH}" fill="#1a1f2e" rx="2" />`;
  s+=`<rect x="${PL}" y="${RTOP}" width="${drawW}" height="${RH*0.3}" fill="rgba(248,113,113,0.04)"/>`;
  s+=`<rect x="${PL}" y="${RTOP+RH*0.7}" width="${drawW}" height="${RH*0.3}" fill="rgba(52,211,153,0.04)"/>`;
  [70,50,30].forEach(v=>{
    const col=v===70?"#f87171":v===50?"#4a5568":"#34d399";
    s+=`<line x1="${PL}" y1="${ry(v)}" x2="${W-PR}" y2="${ry(v)}" stroke="${col}" stroke-width="0.7" stroke-dasharray="3,3" opacity="0.5"/>`;
    s+=`<text x="${W-PR+3}" y="${ry(v)+3}" fill="${col}" font-size="7">${v}</text>`;
  });
  if(rsiArea)s+=`<path d="${rsiArea}" fill="${latestRsi>=50?"rgba(167,139,250,0.12)":"rgba(96,165,250,0.10)"}"/>`;
  if(rsiPts)s+=`<polyline points="${rsiPts}" fill="none" stroke="${rsiColor}" stroke-width="1.5" stroke-linejoin="round"/>`;
  if(latestRsi!==undefined){
    s+=`<circle cx="${cx(candles.length-1)}" cy="${ry(latestRsi)}" r="3" fill="${rsiColor}" stroke="#1a1f2e" stroke-width="1.5"/>`;
    s+=`<text x="${W-PR+3}" y="${ry(latestRsi)+3}" fill="${rsiColor}" font-size="7.5" font-weight="700">${latestRsi.toFixed(1)}</text>`;
  }
  candles.forEach((c,i)=>{if(i%2===0)s+=`<text x="${cx(i)}" y="${TOTAL-2}" text-anchor="middle" fill="#6b7a9e" font-size="7.5">${c.label}</text>`;});
  s+=`</svg>`;
  return s;
}

function sparkline(code,W=70,H=24){
  const seed=code.split("").reduce((a,c)=>a+c.charCodeAt(0),0);
  const closes=genCandles(STOCKS[code].price,seed).map(c=>c.close);
  const min=Math.min(...closes),max=Math.max(...closes);
  const isUp=liveChange(code)>=0;
  const pts=closes.map((v,i)=>`${(i/(closes.length-1))*W},${H-((v-min)/(max-min||1))*H}`).join(" ");
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"><polyline points="${pts}" fill="none" stroke="${isUp?"#34d399":"#f87171"}" stroke-width="1.5" stroke-linejoin="round"/></svg>`;
}

async function callAI(messages, type="stock") {
  const prompt = messages.map(m=>m.content).join("\n");
  const res = await fetch(`${STOCK_API}/ai`, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ prompt, type })
  });
  const data = await res.json();
  return data.content?.filter(b=>b.type==="text").map(b=>b.text).join("\n") || "";
}

      <div style="font-size:36px;margin-bottom:14px;display:inline-block;animation:spin 1.2s linear infinite">⚙️</div>

      <div style="color:#6b7a9e;font-size:12px">오늘의 KOSPI 공포·탐욕 지수를<br>실시간으로 계산하고 있어요</div>
    </div>`;
    return h;
  }

  // 메인 게이지 카드
  h+=`<div style="background:${cfg.bg};border:2px solid ${cfg.color}44;border-radius:20px;padding:24px;margin-bottom:12px;text-align:center">
    <div style="font-size:13px;color:${cfg.color};font-weight:700;letter-spacing:1px;margin-bottom:8px">KOSPI 공포·탐욕 지수</div>
    <div style="font-size:72px;font-weight:900;color:${cfg.color};line-height:1;margin-bottom:6px">${score??'--'}</div>
    <div style="font-size:20px;font-weight:800;color:${cfg.color};margin-bottom:16px">${cfg.emoji} ${cfg.label}</div>
    <!-- 게이지 바 -->
    <div style="height:12px;background:#2d3550;border-radius:6px;overflow:hidden;margin-bottom:6px">
      <div style="height:100%;width:${score}%;background:linear-gradient(90deg,#f87171,#fb923c,#fbbf24,#60a5fa,#34d399);border-radius:6px;transition:width 1s ease"></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:9px;color:#4a5568;margin-bottom:14px">
      <span>0<br>극도공포</span><span>25<br>공포</span><span>50<br>중립</span><span>75<br>탐욕</span><span>100<br>극도탐욕</span>
    </div>
    <div style="font-size:13px;color:#c8d4e8;line-height:1.7;text-align:left;background:#1a1f2e;border-radius:10px;padding:12px">${fngState.summary||""}</div>
    ${fngState.lastFetch?`<div style="font-size:10px;color:#4a5568;margin-top:8px">${fngState.lastFetch.getHours()}:${String(fngState.lastFetch.getMinutes()).padStart(2,"0")} 기준</div>`:""}
  </div>`;

  // 구성 요소별 지표
  if(fngState.factors&&fngState.factors.length>0){
    h+=`<div style="background:#242b40;border-radius:14px;padding:14px;border:1px solid #2d3550;margin-bottom:12px">
      <div style="font-size:11px;color:#4a7cdc;font-weight:700;letter-spacing:1px;margin-bottom:12px">📊 구성 지표별 분석</div>`;
    fngState.factors.forEach(f=>{
      const fc=f.signal==="탐욕"?"#34d399":f.signal==="공포"?"#f87171":"#fbbf24";
      const fbg=f.signal==="탐욕"?"rgba(52,211,153,0.08)":f.signal==="공포"?"rgba(248,113,113,0.08)":"rgba(251,191,36,0.08)";
      h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 12px;background:${fbg};border-radius:10px;margin-bottom:6px;border:1px solid ${fc}33">
        <div><div style="font-size:12px;font-weight:700;color:#e8ecf4">${f.name}</div><div style="font-size:11px;color:#6b7a9e;margin-top:1px">${f.value}</div></div>
        <span style="font-size:10px;font-weight:700;color:${fc};padding:3px 10px;border-radius:20px;background:${fbg};border:1px solid ${fc}44">${f.signal}</span>
      </div>`;
    });
    h+=`</div>`;
  }

  // 투자 전략 힌트
  const hint = score<=20?"📢 극도의 공포 구간 — 역사적으로 매수 기회인 경우가 많아요. 분할매수 전략 고려":
               score<=40?"⚠️ 공포 구간 — 시장이 과도하게 하락했을 수 있어요. 우량주 저점 매수 검토":
               score<=60?"⚖️ 중립 구간 — 방향성이 불명확해요. 관망하거나 분산 투자 유지":
               score<=80?"💡 탐욕 구간 — 과열 징조가 있어요. 차익실현 또는 신규매수 자제":
               "🚨 극도의 탐욕 구간 — 버블 위험 높아요. 보유 비중 축소 고려";

    <div style="font-size:11px;color:${cfg.color};font-weight:700;margin-bottom:6px">💬 투자 참고 전략</div>
    <div style="font-size:13px;color:#c8d4e8;line-height:1.7">${hint}</div>
    <div style="font-size:10px;color:#4a5568;margin-top:10px">⚠️ 투자 참고용입니다. 실제 투자 결정은 본인 판단으로.</div>
  </div>`;
  return h;
}

// ── Render helpers ────────────────────────────────────────────────────────
function watchBtn(code,big=false){
  const w=inWatch(code);
  const style=big
    ?`width:100%;padding:9px;border-radius:10px;border:none;cursor:pointer;font-weight:700;font-size:13px;display:block;margin-top:10px;background:${w?"#1e3a1a":"linear-gradient(135deg,#1e2d4a,#253d5e)"};color:${w?"#34d399":"#fbbf24"}`
    :`padding:4px 10px;border-radius:6px;border:none;cursor:pointer;font-size:11px;font-weight:700;background:${w?"#1e3a1a":"#1e2d4a"};color:${w?"#34d399":"#fbbf24"}`;
  return `<button onclick="event.stopPropagation();toggleWatch('${code}');return false" style="${style}">${w?(big?"✓ 관심종목에 추가됨":"✓ 관심"):(big?"⭐ 관심종목에 추가":"⭐ 추가")}</button>`;
}

function toggleWatch(code){
  if(inWatch(code))removeWatch(code);else addWatch(code);
  render();renderModal();renderSectorModal();
}

// ── Main render ───────────────────────────────────────────────────────────
function render(){
  const el=document.getElementById("tab-content");
  if(state.tab==="watchlist")el.innerHTML=renderWatchlist();
  else if(state.tab==="hot")el.innerHTML=renderHot();
  else if(state.tab==="fng")el.innerHTML=renderFng();
  else if(state.tab==="news")el.innerHTML=renderNews();
  else if(state.tab==="ai")el.innerHTML=renderAITab();
  // Re-bind dynamic events
  document.querySelectorAll("[data-openstock]").forEach(e=>e.addEventListener("click",()=>openStockModal(e.dataset.openstock)));
  document.querySelectorAll("[data-opensector]").forEach(e=>e.addEventListener("click",()=>openSectorModal(e.dataset.opensector)));
}

function renderWatchlist(){
  let h=`<button onclick="openSearchOverlay()" style="width:100%;margin-bottom:12px;padding:11px 16px;background:#242b40;border:1px solid #2d3550;border-radius:12px;color:#6b7fa3;font-size:13px;text-align:left;cursor:pointer;display:flex;align-items:center;gap:8px"><span style="font-size:15px">🔍</span> 종목 검색하여 관심목록 추가...</button>`;
  h+=`<div style="font-size:11px;color:#6b7fa3;margin-bottom:10px">종목 탭 → 차트 · RSI · 지지저항</div>`;
  if(state.watchlist.length===0)return h+`<div style="text-align:center;padding:40px;color:#6b7fa3"><div style="font-size:32px;margin-bottom:8px">⭐</div>검색에서 종목을 추가해보세요</div>`;
  state.watchlist.forEach(code=>{
    const s=STOCKS[code],lp=livePrice(code),lc=liveChange(code),isUp=lc>=0;
    h+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;padding:13px 13px 10px;cursor:pointer" data-openstock="${code}"><div style="flex:1"><div style="font-weight:700;font-size:15px">${s.name}</div><div style="font-size:11px;color:#4a7cdc;margin-top:1px">${code} · ${s.sector}</div><div style="font-size:10px;color:#6b7fa3;margin-top:2px">탭 → 차트+RSI 보기</div></div><div style="text-align:right;margin-right:10px"><div style="font-weight:800;font-size:16px">${lp.toLocaleString()}원</div><div style="font-size:12px;color:${isUp?"#34d399":"#f87171"};font-weight:600">${isUp?"▲":"▼"} ${Math.abs(lc).toFixed(2)}%</div></div><button onclick="event.stopPropagation();removeWatch('${code}');render()" style="background:#2d3550;border:none;border-radius:8px;color:#f87171;padding:6px 9px;cursor:pointer;font-size:13px">✕</button></div><div style="background:#1a1f2e;border-top:1px solid #2d3550;padding:9px 13px 11px"><div style="font-size:10px;color:#4a7cdc;font-weight:700;letter-spacing:1px;margin-bottom:7px">수급 현황</div>${supplyBars(code)}</div></div>`;
  });
  return h;
}

function renderHot(){
  const hs=state.hotSector;
  const hotCodes=Object.keys(STOCKS).filter(c=>STOCKS[c].sector===hs.sector);
  let h=`<div style="background:linear-gradient(135deg,#2a1f42,#3d2a10);border-radius:16px;padding:18px 18px 14px;margin-bottom:14px;border:1px solid ${hs.color}44;position:relative;overflow:hidden;cursor:pointer" data-opensector="${hs.sector}"><div style="position:absolute;top:-20px;right:-20px;font-size:80px;opacity:0.08">🔥</div><div style="font-size:10px;color:${hs.color};font-weight:700;letter-spacing:2px;margin-bottom:6px">TODAY'S HOT SECTOR · 탭하여 대장주 보기 →</div><div style="font-size:22px;font-weight:900;color:#fff;margin-bottom:4px">${hs.theme}</div><div style="font-size:12px;color:#94a3b8;line-height:1.6">${hs.reason}</div><div style="display:flex;gap:8px;margin-top:12px"><div style="background:rgba(255,255,255,0.06);border-radius:8px;padding:5px 12px;font-size:11px;color:${hs.color};font-weight:700">📌 ${hs.sector} 섹터</div><div style="background:rgba(255,255,255,0.06);border-radius:8px;padding:5px 12px;font-size:11px;color:#94a3b8">${hotCodes.length}개 종목</div></div></div>`;
  h+=`<div style="font-size:12px;color:#6b7fa3;margin-bottom:10px;display:flex;justify-content:space-between"><span>🔥 급등 · 거래 활발 종목</span><span style="font-size:10px;color:#4a7cdc">탭 → 차트</span></div>`;
  const list=[...hotCodes,...state.volRank.filter(v=>!hotCodes.includes(v.code)).slice(0,4).map(v=>v.code)].slice(0,8);
  list.forEach((code,idx)=>{
    const s=STOCKS[code],lp=livePrice(code),lc=liveChange(code),isUp=lc>=0,isHot=hotCodes.includes(code),vol=liveVol(code),vr=state.volRank.findIndex(v=>v.code===code)+1;
    h+=`<div class="card slide-up" style="animation-delay:${idx*50}ms;border-color:${isHot?hs.color+"55":"#15243a"};cursor:pointer"><div style="display:flex;align-items:center;padding:13px 14px" data-openstock="${code}"><div style="width:28px;height:28px;border-radius:8px;background:${idx<3?"linear-gradient(135deg,#f59e0b,#ef4444)":"#15243a"};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:${idx<3?"#fff":"#6b7fa3"};margin-right:12px;flex-shrink:0">${idx+1}</div><div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:6px"><div style="font-weight:700;font-size:15px">${s.name}</div>${isHot?`<span style="font-size:9px;background:${hs.color}22;color:${hs.color};border-radius:4px;padding:1px 6px;font-weight:700;border:1px solid ${hs.color}44">🔥 테마</span>`:""}</div><div style="font-size:11px;color:#6b7fa3;margin-top:1px">${code} · ${s.sector}</div><div style="margin-top:4px">${sparkline(code)}</div></div><div style="text-align:right;margin-left:10px;flex-shrink:0"><div style="font-weight:800;font-size:15px">${lp.toLocaleString()}원</div><div style="font-size:13px;color:${isUp?"#34d399":"#f87171"};font-weight:700;margin-top:1px">${isUp?"▲":"▼"} ${Math.abs(lc).toFixed(2)}%</div><div style="font-size:10px;color:#6b7fa3;margin-top:3px">거래 ${vol}만주 · #${vr}</div>${watchBtn(code)}</div></div><div style="height:2px;background:linear-gradient(90deg,transparent,${isUp?"#34d399":"#f87171"},transparent)"></div></div>`;
  });
  // Sector heatmap
  h+=`<div style="background:#242b40;border-radius:14px;padding:14px;border:1px solid #2d3550;margin-top:4px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div style="font-size:11px;color:#4a7cdc;font-weight:700;letter-spacing:1px">섹터별 등락 현황</div><div style="font-size:9px;color:#6b7fa3">탭 → 대장주 보기</div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">`;
  ["반도체","IT","자동차","바이오","금융","화학","배터리"].forEach(sec=>{
    const codes=Object.keys(STOCKS).filter(c=>STOCKS[c].sector===sec);
    const avg=codes.length?codes.reduce((a,c)=>a+liveChange(c),0)/codes.length:0;
    const isUp=avg>=0,isToday=sec===hs.sector;
    h+=`<div style="border-radius:8px;padding:8px 10px;background:${isToday?hs.color+"15":isUp?"rgba(52,211,153,0.06)":"rgba(248,113,113,0.06)"};border:1px solid ${isToday?hs.color+"44":isUp?"rgba(52,211,153,0.2)":"rgba(248,113,113,0.2)"};display:flex;justify-content:space-between;align-items:center;cursor:pointer" data-opensector="${sec}"><div><div style="font-size:11px;font-weight:700;color:#e8ecf4">${sec}</div>${isToday?`<div style="font-size:9px;color:${hs.color};font-weight:700">🔥 HOT</div>`:""}</div><div style="display:flex;align-items:center;gap:4px"><div style="font-size:13px;font-weight:700;color:${isUp?"#34d399":"#f87171"}">${isUp?"+":""}${avg.toFixed(2)}%</div><div style="font-size:9px;color:#7a8aaa">›</div></div></div>`;
  });
  h+=`</div></div>`;
  return h;
}

      h+=`<div style="background:#242b40;border-radius:16px;padding:32px;text-align:center;border:1px solid #2d3550">

  codes.forEach(code=>{
    const s=STOCKS[code],lp=livePrice(code),lc=liveChange(code),w=inWatch(code);
    h+=`<div style="background:#242b40;border-radius:12px;padding:13px;margin-bottom:8px;border:1px solid ${q?"#4a7cdc":"#15243a"};display:flex;justify-content:space-between;align-items:center"><div style="flex:1;cursor:pointer" onclick="searchAndOpen('${code}')"><div style="font-weight:700">${s.name}</div><div style="font-size:11px;color:#6b7fa3">${code} · ${s.sector}</div></div><div style="text-align:right;margin-right:12px"><div style="font-weight:700;font-size:14px">${lp.toLocaleString()}원</div><div style="font-size:12px;color:${lc>=0?"#34d399":"#f87171"}">${lc>=0?"▲":"▼"}${Math.abs(lc).toFixed(2)}%</div></div><button onclick="if(${w})removeWatch('${code}');else addWatch('${code}');render();updateSearch(document.getElementById('search-input')?.value||'')" style="background:${w?"#1e3a1a":"#1e2d4a"};border:none;border-radius:8px;color:${w?"#34d399":"#fbbf24"};padding:8px 12px;cursor:pointer;font-size:15px;font-weight:700">${w?"✓":"＋"}</button></div>`;
  });
  const el=document.getElementById("search-results");if(el)el.innerHTML=h;
}

// ── PWA manifest inline ───────────────────────────────────────────────────
const manifest={name:"내 주식 앱",short_name:"주식앱",description:"한국 주식 실시간 트래커",start_url:".",display:"standalone",background_color:"#1e2438",theme_color:"#1e2438",orientation:"portrait",icons:[{src:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231e2438'/><text y='.9em' font-size='80'>📈</text></svg>",sizes:"192x192",type:"image/svg+xml"},{src:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231e2438'/><text y='.9em' font-size='80'>📈</text></svg>",sizes:"512x512",type:"image/svg+xml"}]};
const blob=new Blob([JSON.stringify(manifest)],{type:"application/json"});
document.getElementById("manifest-link").href=URL.createObjectURL(blob);

// ── Service Worker (offline cache) ────────────────────────────────────────
if("serviceWorker"in navigator){
  const sw=`self.addEventListener("install",e=>e.waitUntil(caches.open("v1").then(c=>c.addAll(["."]))));self.addEventListener("fetch",e=>{if(e.request.url.includes("anthropic.com"))return;e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));});`;
  const swBlob=new Blob([sw],{type:"application/javascript"});
  navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(()=>{});
}

// ── Init ──────────────────────────────────────────────────────────────────
render();
</script>

.tab-btn .badge{position:absolute;top:4px;right:calc(50% - 14px);width:6px;height:6px;background:#ef4444;border-radius:50%;animation:pulse 1.5s infinite}

@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.2}}
@keyframes slideUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}

.live-dot{width:6px;height:6px;background:#22c55e;border-radius:50%;animation:pulse 1.5s infinite;display:inline-block;margin-right:4px}

const SECTOR_META={
  "반도체":{icon:"💾",color:"#60a5fa",leaders:["005930","000660"],roles:{"005930":"대장주·시총1위","000660":"주도주·HBM핵심"},catalyst:"HBM4 수요 급증"},
  "IT":{icon:"🤖",color:"#a78bfa",leaders:["035420","035720"],roles:{"035420":"대장주·AI검색","035720":"주도주·AI메신저"},catalyst:"AI MAU 급등"},
  "자동차":{icon:"🚗",color:"#f59e0b",leaders:["000270","005380"],roles:{"000270":"대장주·EV수출1위","005380":"주도주·프리미엄EV"},catalyst:"관세완화+EV회복"},
  "바이오":{icon:"💊",color:"#22c55e",leaders:["207940","068270"],roles:{"207940":"대장주·CMO글로벌","068270":"주도주·FDA승인"},catalyst:"신약승인+기술이전"},

};

// ── State ─────────────────────────────────────────────────────────────────
let state = {
  tab: "watchlist",
  watchlist: ["005930","000660","035420","035720"],
  liveFlux: {},
  realPrices: {},
  supplyData: {},
  searchQ: "",
  showSearch: false,
  selectedCode: null,
  selectedSector: null,
  aiStock: null, aiResult: "", aiLoading: false,
  newsItems: [], newsLoading: false, newsError: "", newsLastFetch: null, newsVisited: false,
  newsTab: "korea",
  usNewsItems: [], usNewsLoading: false, usNewsError: "", usNewsLastFetch: null,
  expandedNews: null, expandedUsNews: null,
  modalChartAI: "", modalChartLoading: false,
  sectorAI: "", sectorAILoading: false,
  volRank: Object.keys(STOCKS).map(c=>({code:c,vol:Math.random()*100+10})).sort((a,b)=>b.vol-a.vol),
  hotSector: HOT_POOL[new Date().getDate()%HOT_POOL.length],
  lastFetchTime: null,
};

// ── Helpers ───────────────────────────────────────────────────────────────
const fmt = v => Math.round(v).toLocaleString("ko-KR");
const fmtPct = v => (v>0?"+":"")+v.toFixed(2)+"%";
const livePrice = c => state.realPrices[c]?.price || STOCKS[c]?.price || 0;
const liveChange = c => state.realPrices[c]?.change_pct || STOCKS[c]?.change || 0;
const liveVol = c => { const r=state.volRank.find(v=>v.code===c); return r?(r.vol*(1+(state.liveFlux[c]||0)*2)).toFixed(1):"0"; };

function rng(s){let x=Math.sin(s)*10000;return x-Math.floor(x);}
function genCandles(basePrice,seed){
  const candles=[]; let price=basePrice*(0.92+rng(seed)*0.08);
  const now=new Date();
  for(let i=13;i>=0;i--){
    const d=new Date(now);d.setDate(d.getDate()-i);
    if(d.getDay()===0||d.getDay()===6)continue;
    const vol=0.015+rng(seed+i*7)*0.02;
    const open=price,close=open*(1+(rng(seed+i*3)-0.48)*vol*2);
    const high=Math.max(open,close)*(1+rng(seed+i*11)*vol*0.5);
    const low=Math.min(open,close)*(1-rng(seed+i*13)*vol*0.5);
    candles.push({open,close,high,low,label:`${d.getMonth()+1}/${d.getDate()}`});
    price=close;
  }
  return candles;
}
function computeLevels(candles){
  const sh=[...candles.map(c=>c.high)].sort((a,b)=>b-a);
  const sl=[...candles.map(c=>c.low)].sort((a,b)=>a-b);
  const closes=candles.map(c=>c.close);
  return{resistance1:sh[0],resistance2:sh.find(h=>h<sh[0]*0.993)||sh[0]*0.995,
    support1:sl[0],support2:sl.find(l=>l>sl[0]*1.003)||sl[0]*1.005,
    ma10:closes.reduce((a,b)=>a+b,0)/closes.length};
}
function computeRSI(candles,period=14){
  const closes=candles.map(c=>c.close);
  if(closes.length<period+1)return closes.map(()=>50);
  const ch=closes.slice(1).map((v,i)=>v-closes[i]);
  const vals=new Array(period).fill(null);
  let ag=ch.slice(0,period).filter(v=>v>0).reduce((a,b)=>a+b,0)/period;
  let al=Math.abs(ch.slice(0,period).filter(v=>v<0).reduce((a,b)=>a+b,0))/period;
  vals.push(100-100/(1+(al===0?100:ag/al)));
  for(let i=period;i<ch.length;i++){
    const g=Math.max(ch[i],0),l=Math.abs(Math.min(ch[i],0));
    ag=(ag*(period-1)+g)/period;al=(al*(period-1)+l)/period;
    vals.push(100-100/(1+(al===0?100:ag/al)));
  }
  return vals;
}
function getRsiSignal(rsi){
  if(rsi===null)return null;
  if(rsi>=70)return{label:"과매수",color:"#ef4444",bg:"rgba(248,113,113,0.12)",icon:"🔴",badge:"SELL"};
  if(rsi>=60)return{label:"강세",color:"#fb923c",bg:"rgba(251,146,60,0.10)",icon:"🟠",badge:"HOLD↑"};
  if(rsi>=40)return{label:"중립",color:"#94a3b8",bg:"rgba(148,163,184,0.08)",icon:"⚪",badge:"WATCH"};
  if(rsi>=30)return{label:"약세",color:"#60a5fa",bg:"rgba(96,165,250,0.10)",icon:"🔵",badge:"HOLD↓"};
  return{label:"과매도",color:"#22c55e",bg:"rgba(52,211,153,0.12)",icon:"🟢",badge:"BUY"};
}

// ── localStorage 관심종목 저장/불러오기 ──────────────────────────────────
function saveWatchlist() {
  try { localStorage.setItem("watchlist_v1", JSON.stringify(state.watchlist)); } catch(e){}
}
function loadWatchlist() {
  try {
    const saved = localStorage.getItem("watchlist_v1");
    if (saved) state.watchlist = JSON.parse(saved);
  } catch(e){}
}

function addWatch(code){ if(!state.watchlist.includes(code)){ state.watchlist=[...state.watchlist,code]; saveWatchlist(); }}
function removeWatch(code){ state.watchlist=state.watchlist.filter(c=>c!==code); saveWatchlist(); }
function inWatch(code){ return state.watchlist.includes(code); }

// 앱 시작 시 관심종목 불러오기
loadWatchlist();
async function fetchRealPrices(codes) {
  for (const code of codes) {
    try {
      const d = await fetch(`${STOCK_API}/?symbol=${code}`).then(r=>r.json());
      const basePrice = STOCKS[code]?.price || 0;
      // 기준가 대비 20% ~ 500% 범위만 유효한 값으로 인정
      const isValid = d.price > 0
        && d.price > basePrice * 0.2
        && d.price < basePrice * 5;
      if (isValid) {
        state.realPrices[code] = {...d, code};
        STOCKS[code].price = d.price;
      }
    } catch(e) {}
    await new Promise(r => setTimeout(r, 300));
  }
  state.lastFetchTime = new Date();
}

// 수급 시뮬레이션 (KIS 무료 API는 수급 미제공)
function tickSupply() {
  const supply = {};
  Object.keys(STOCKS).forEach(code => {
    const h = code.split("").reduce((a,c)=>a+c.charCodeAt(0),0);
    const seed = {foreign:30+(h%40), institution:10+((h*3)%30)};
    const fp = seed.foreign+(Math.random()-0.5)*4;
    const ip = seed.institution+(Math.random()-0.5)*3;
    supply[code] = {
      foreign:     {pct:fp,               net:(Math.random()-0.42)*800},
      institution: {pct:ip,               net:(Math.random()-0.48)*400},
      individual:  {pct:Math.max(100-fp-ip,5), net:(Math.random()-0.5)*500},
    };
  });
  state.supplyData = supply;
}

// 초기 로드
tickSupply();
fetchRealPrices(Object.keys(STOCKS)).then(()=>{ render(); fetchFng(); });

  render();
  const el = document.getElementById("last-update");

// 수급만 5초마다 갱신
setInterval(()=>{ tickSupply(); render(); }, 5000);

// ── 넥스트 장 정보 (초단위 카운트다운) ──────────────────────────────────────
function updateSessionBar() {
  // 한국 시간 직접 계산
  const now = new Date();
  const KST = new Date(now.toLocaleString("en-US", {timeZone: "Asia/Seoul"}));
  const h = KST.getHours(), m = KST.getMinutes(), s = KST.getSeconds(), day = KST.getDay();
  const totalSec = h*3600 + m*60 + s;

  const PRE_OPEN  = 8*3600+30*60;   // 08:30 장전 동시호가
  const OPEN      = 9*3600;          // 09:00 정규장
  const CLOSE     = 15*3600+30*60;  // 15:30 장마감
  const POST_CLOSE= 16*3600;         // 16:00 장후 동시호가 종료
  const isWeekend = day===0||day===6;

  const iconEl  = document.getElementById("session-icon");
  const labelEl = document.getElementById("session-label");
  const timeEl  = document.getElementById("session-time");
  const nextEl  = document.getElementById("next-session-info");
  const barEl   = document.getElementById("next-session-bar");
  if (!iconEl) return;

  // 디버깅용 - KST 시간 확인
  console.log(`KST: ${h}:${m}:${s} day:${day} totalSec:${totalSec}`);

  function countdown(targetSec) {
    const diff = targetSec - totalSec;
    const hh = Math.floor(diff/3600);
    const mm = Math.floor((diff%3600)/60);
    const ss = diff%60;
    if(hh>0) return `${hh}시간 ${mm}분 ${ss}초`;
    if(mm>0) return `${mm}분 ${ss}초`;
    return `${ss}초`;
  }

  // 미국 장 상태 계산 (ET = KST - 14시간, 서머타임 고려 근사)
  const etHour = ((h - 14) + 24) % 24;
  const usOpen  = etHour >= 9.5 && etHour < 16;
  const usLabel = usOpen ? "🇺🇸 미증시 개장중" : "🇺🇸 미증시 마감";
  const usColor = usOpen ? "#60a5fa" : "#4a5568";

  if (isWeekend) {
    iconEl.textContent  = "🌙";
    labelEl.textContent = day===6 ? "토요일 — 장 휴장" : "일요일 — 장 휴장";
    labelEl.style.color = "#6b7a9e";
    timeEl.textContent  = usLabel;
    timeEl.style.color  = usColor;
    nextEl.textContent  = "월요일 08:30 동시호가";
    barEl.style.borderColor = "#2d3550";
  } else if (totalSec < PRE_OPEN) {
    iconEl.textContent  = "🌅";
    labelEl.textContent = "장 준비중";
    labelEl.style.color = "#f59e0b";
    timeEl.textContent  = `동시호가까지 ${countdown(PRE_OPEN)}`;
    timeEl.style.color  = "#f59e0b";
    nextEl.textContent  = "08:30 장전 동시호가";
    barEl.style.borderColor = "#fbbf2455";
  } else if (totalSec < OPEN) {
    iconEl.textContent  = "⚡";
    labelEl.textContent = "장전 동시호가";
    labelEl.style.color = "#fb923c";
    timeEl.textContent  = `개장까지 ${countdown(OPEN)}`;
    timeEl.style.color  = "#fb923c";
    nextEl.textContent  = "09:00 정규장 개장";
    barEl.style.borderColor = "#fb923c55";
  } else if (totalSec < CLOSE) {
    iconEl.textContent  = "📈";
    labelEl.textContent = "정규장 거래중 🟢";
    labelEl.style.color = "#22c55e";
    timeEl.textContent  = `마감까지 ${countdown(CLOSE)}`;
    timeEl.style.color  = "#22c55e";
    nextEl.textContent  = "15:30 장마감";
    barEl.style.borderColor = "#34d39955";
  } else if (totalSec < POST_CLOSE) {
    iconEl.textContent  = "🔔";
    labelEl.textContent = "장후 동시호가";
    labelEl.style.color = "#60a5fa";
    timeEl.textContent  = `종료까지 ${countdown(POST_CLOSE)}`;
    timeEl.style.color  = "#60a5fa";
    nextEl.textContent  = day===5?"월요일 09:00":"내일 09:00 개장";
    barEl.style.borderColor = "#60a5fa55";
  } else {
    iconEl.textContent  = "🌙";
    labelEl.textContent = "오늘 장마감";
    labelEl.style.color = "#6b7a9e";
    timeEl.textContent  = usLabel;
    timeEl.style.color  = usColor;
    nextEl.textContent  = day===5?"월요일 08:30":"내일 08:30 동시호가";
    barEl.style.borderColor = "#2d3550";
  }
}

function getFngColor(score) {
  if(score <= 20) return { color:"#ef4444", bg:"rgba(248,113,113,0.12)", label:"극도의 공포", emoji:"😱" };
  if(score <= 40) return { color:"#fb923c", bg:"rgba(251,146,60,0.10)",  label:"공포",       emoji:"😨" };
  if(score <= 60) return { color:"#f59e0b", bg:"rgba(251,191,36,0.10)",  label:"중립",       emoji:"😐" };
  if(score <= 80) return { color:"#60a5fa", bg:"rgba(96,165,250,0.10)",  label:"탐욕",       emoji:"😏" };
  return                 { color:"#22c55e", bg:"rgba(52,211,153,0.12)",  label:"극도의 탐욕", emoji:"🤑" };
}

async function fetchFng() {
  fngState.loading = true;
  updateFngBar();
  try {
    // 실제 시장 데이터 기반 공포탐욕 계산
    const codes = Object.keys(STOCKS);
    const changes = codes.map(c => liveChange(c)).filter(v => v !== 0);
    if (changes.length === 0) throw new Error("no data");

    // 1. 시장 모멘텀 (평균 등락률)
    const avgChange = changes.reduce((a,b)=>a+b,0)/changes.length;
    const momentumScore = Math.min(100, Math.max(0, 50 + avgChange * 5));

    // 2. 상승 종목 비율
    const upRatio = changes.filter(v=>v>0).length / changes.length;
    const breadthScore = upRatio * 100;

    // 3. 변동성 (표준편차)
    const avg = changes.reduce((a,b)=>a+b,0)/changes.length;
    const variance = changes.reduce((a,b)=>a+Math.pow(b-avg,2),0)/changes.length;
    const stdDev = Math.sqrt(variance);
    const volScore = Math.max(0, 100 - stdDev * 10);

    // 4. 외국인 수급
    const supCodes = Object.keys(state.supplyData);
    let foreignNetSum = 0;
    supCodes.forEach(c => { foreignNetSum += state.supplyData[c]?.foreign?.net||0; });
    const foreignScore = Math.min(100, Math.max(0, 50 + foreignNetSum/1000));

    // 최종 점수 (가중평균)
    const score = Math.round(
      momentumScore * 0.35 +
      breadthScore  * 0.25 +
      volScore      * 0.25 +
      foreignScore  * 0.15
    );

    const cfg = getFngColor(score);
    fngState.score   = score;
    fngState.summary = `${cfg.label} 구간입니다. 평균 등락률 ${avgChange.toFixed(2)}%, 상승종목 ${Math.round(upRatio*100)}%, 외국인 ${foreignNetSum>0?"순매수":"순매도"} 흐름.`;
    fngState.factors = [
      {name:"시장 모멘텀",  value:`평균 ${avgChange.toFixed(2)}%`,        signal: avgChange>0?"탐욕":avgChange<-1?"공포":"중립"},
      {name:"상승 종목 비율",value:`${Math.round(upRatio*100)}%`,          signal: upRatio>0.6?"탐욕":upRatio<0.4?"공포":"중립"},
      {name:"변동성",       value:`표준편차 ${stdDev.toFixed(2)}`,         signal: stdDev<1?"탐욕":stdDev>2?"공포":"중립"},
      {name:"외국인 수급",  value:`${foreignNetSum>0?"+":""}${(foreignNetSum/100).toFixed(0)}억`, signal: foreignNetSum>0?"탐욕":foreignNetSum<-500?"공포":"중립"},
    ];
    fngState.lastFetch = new Date();
  } catch(e) {
    fngState.score = 50;
    fngState.summary = "시장 데이터를 불러오는 중입니다.";
    fngState.factors = [];
  }
  fngState.loading = false;
  updateFngBar();
  if(state.tab==="fng") render();
}

function updateFngBar() {
  const score = fngState.score;
  if(score === null) return;
  const cfg = getFngColor(score);
  const scoreEl = document.getElementById("fng-score");
  const labelEl = document.getElementById("fng-label");
  const progEl  = document.getElementById("fng-progress");
  if(scoreEl) scoreEl.textContent = fngState.loading ? "--" : score;
  if(scoreEl) scoreEl.style.color = cfg.color;

  if(progEl)  { progEl.style.width = `${score}%`; progEl.style.background = cfg.color; }
}

// ── SVG Chart ─────────────────────────────────────────────────────────────
function svgChart(candles,levels,currentPrice,rsiValues){
  const W=420,CTOP=0,CH=124,RTOP=140,RH=60,TOTAL=210,PL=8,PR=60;
  const drawW=W-PL-PR;
  const allP=[...candles.flatMap(c=>[c.high,c.low]),levels.resistance1,levels.support1,currentPrice];
  const minP=Math.min(...allP)*0.998,maxP=Math.max(...allP)*1.002,priceRange=maxP-minP;
  const py=p=>CTOP+CH-((p-minP)/priceRange)*CH;
  const n=candles.length,cw=Math.max(4,(drawW/n)*0.55),step=drawW/n;
  const cx=i=>PL+step*i+step/2;
  const ry=v=>RTOP+RH-(v/100)*RH;
  const validRsi=rsiValues.filter(v=>v!==null);
  const latestRsi=validRsi[validRsi.length-1];
  const rsiColor=latestRsi>=70?"#ef4444":latestRsi<=30?"#22c55e":"#a78bfa";
  const rsiPts=rsiValues.map((v,i)=>v!==null?`${cx(i)},${ry(v)}`:null).filter(Boolean).join(" ");
  const rsiArea=(()=>{const pts=rsiValues.map((v,i)=>v!==null?{x:cx(i),y:ry(v)}:null).filter(Boolean);return pts.length>1?`M${pts[0].x},${ry(50)} ${pts.map(p=>`L${p.x},${p.y}`).join(" ")} L${pts[pts.length-1].x},${ry(50)} Z`:"";})();
  let s=`<svg width="100%" viewBox="0 0 ${W} ${TOTAL}" style="display:block">`;
  // grid
  [0.25,0.5,0.75].forEach(g=>s+=`<line x1="${PL}" y1="${py(minP+priceRange*g)}" x2="${W-PR}" y2="${py(minP+priceRange*g)}" stroke="#2d3a52" stroke-width="1" stroke-dasharray="3,3"/>`);
  // R/S lines
  s+=`<line x1="${PL}" y1="${py(levels.resistance1)}" x2="${W-PR}" y2="${py(levels.resistance1)}" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="5,3"/>`;
  s+=`<text x="${W-PR+3}" y="${py(levels.resistance1)+4}" fill="#ef4444" font-size="8" font-weight="700">R1</text>`;
  s+=`<text x="${W-PR+3}" y="${py(levels.resistance1)+13}" fill="#ef4444" font-size="7">${fmt(levels.resistance1)}</text>`;
  s+=`<line x1="${PL}" y1="${py(levels.resistance2)}" x2="${W-PR}" y2="${py(levels.resistance2)}" stroke="#fca5a5" stroke-width="0.8" stroke-dasharray="3,4" opacity="0.6"/>`;
  s+=`<text x="${W-PR+3}" y="${py(levels.resistance2)+4}" fill="#fca5a5" font-size="7" opacity="0.7">R2</text>`;
  s+=`<line x1="${PL}" y1="${py(levels.support1)}" x2="${W-PR}" y2="${py(levels.support1)}" stroke="#22c55e" stroke-width="1.2" stroke-dasharray="5,3"/>`;
  s+=`<text x="${W-PR+3}" y="${py(levels.support1)+4}" fill="#22c55e" font-size="8" font-weight="700">S1</text>`;
  s+=`<text x="${W-PR+3}" y="${py(levels.support1)+13}" fill="#22c55e" font-size="7">${fmt(levels.support1)}</text>`;
  s+=`<line x1="${PL}" y1="${py(levels.support2)}" x2="${W-PR}" y2="${py(levels.support2)}" stroke="#6ee7b7" stroke-width="0.8" stroke-dasharray="3,4" opacity="0.6"/>`;
  s+=`<text x="${W-PR+3}" y="${py(levels.support2)+4}" fill="#6ee7b7" font-size="7" opacity="0.7">S2</text>`;
  // MA10
  s+=`<polyline points="${candles.map((c,i)=>`${cx(i)},${py(c.close)}`).join(" ")}" fill="none" stroke="#f59e0b" stroke-width="1.2" opacity="0.7"/>`;
  // Candles
  candles.forEach((c,i)=>{
    const isUp=c.close>=c.open,color=isUp?"#22c55e":"#ef4444";
    const rv=rsiValues[i],isExt=rv!==null&&(rv>=70||rv<=30);
    if(isExt)s+=`<rect x="${cx(i)-cw}" y="${CTOP}" width="${cw*2}" height="${CH}" fill="${rv>=70?"rgba(248,113,113,0.06)":"rgba(52,211,153,0.06)"}"/>`;
    const bt=py(Math.max(c.open,c.close)),bb=py(Math.min(c.open,c.close));
    s+=`<line x1="${cx(i)}" y1="${py(c.high)}" x2="${cx(i)}" y2="${py(c.low)}" stroke="${color}" stroke-width="1"/>`;
    s+=`<rect x="${cx(i)-cw/2}" y="${bt}" width="${cw}" height="${Math.max(bb-bt,1)}" fill="${color}" rx="1"/>`;
  });
  // Current price
  s+=`<line x1="${PL}" y1="${py(currentPrice)}" x2="${W-PR}" y2="${py(currentPrice)}" stroke="#60a5fa" stroke-width="1" stroke-dasharray="2,2" opacity="0.9"/>`;
  s+=`<text x="${W-PR+3}" y="${py(currentPrice)+4}" fill="#60a5fa" font-size="7.5" font-weight="700">현재</text>`;
  // Separator + RSI label
  s+=`<line x1="${PL}" y1="${RTOP-8}" x2="${W-PR}" y2="${RTOP-8}" stroke="#1e2d4a" stroke-width="1"/>`;
  s+=`<text x="${PL}" y="${RTOP-1}" fill="#6b7a9e" font-size="8" font-weight="600">RSI(14)</text>`;
  // RSI BG
  s+=`<rect x="${PL}" y="${RTOP}" width="${drawW}" height="${RH}" fill="#1a1f2e" rx="2" />`;
  s+=`<rect x="${PL}" y="${RTOP}" width="${drawW}" height="${RH*0.3}" fill="rgba(248,113,113,0.04)"/>`;
  s+=`<rect x="${PL}" y="${RTOP+RH*0.7}" width="${drawW}" height="${RH*0.3}" fill="rgba(52,211,153,0.04)"/>`;
  [70,50,30].forEach(v=>{
    const col=v===70?"#ef4444":v===50?"#4a5568":"#22c55e";
    s+=`<line x1="${PL}" y1="${ry(v)}" x2="${W-PR}" y2="${ry(v)}" stroke="${col}" stroke-width="0.7" stroke-dasharray="3,3" opacity="0.5"/>`;
    s+=`<text x="${W-PR+3}" y="${ry(v)+3}" fill="${col}" font-size="7">${v}</text>`;
  });
  if(rsiArea)s+=`<path d="${rsiArea}" fill="${latestRsi>=50?"rgba(167,139,250,0.12)":"rgba(96,165,250,0.10)"}"/>`;
  if(rsiPts)s+=`<polyline points="${rsiPts}" fill="none" stroke="${rsiColor}" stroke-width="1.5" stroke-linejoin="round"/>`;
  if(latestRsi!==undefined){
    s+=`<circle cx="${cx(candles.length-1)}" cy="${ry(latestRsi)}" r="3" fill="${rsiColor}" stroke="#1a1f2e" stroke-width="1.5"/>`;
    s+=`<text x="${W-PR+3}" y="${ry(latestRsi)+3}" fill="${rsiColor}" font-size="7.5" font-weight="700">${latestRsi.toFixed(1)}</text>`;
  }
  candles.forEach((c,i)=>{if(i%2===0)s+=`<text x="${cx(i)}" y="${TOTAL-2}" text-anchor="middle" fill="#6b7a9e" font-size="7.5">${c.label}</text>`;});
  s+=`</svg>`;
  return s;
}

function sparkline(code,W=70,H=24){
  const seed=code.split("").reduce((a,c)=>a+c.charCodeAt(0),0);
  const closes=genCandles(STOCKS[code].price,seed).map(c=>c.close);
  const min=Math.min(...closes),max=Math.max(...closes);
  const isUp=liveChange(code)>=0;
  const pts=closes.map((v,i)=>`${(i/(closes.length-1))*W},${H-((v-min)/(max-min||1))*H}`).join(" ");
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"><polyline points="${pts}" fill="none" stroke="${isUp?"#22c55e":"#ef4444"}" stroke-width="1.5" stroke-linejoin="round"/></svg>`;
}

  return h;
}

async function callAI(messages, type="stock") {
  const prompt = messages.map(m=>m.content).join("\n");
  const res = await fetch(`${STOCK_API}/ai`, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ prompt, type })
  });
  const data = await res.json();
  return data.content?.filter(b=>b.type==="text").map(b=>b.text).join("\n") || "";
}

function parseImpact(title) {
  const up = ["상승","급등","돌파","호재","매수","서프라이즈","흑자","증가","신고가","반등","강세"];
  const dn = ["하락","급락","악재","매도","부진","적자","감소","신저가","폭락","약세","공포"];
  const tu = up.filter(w=>title.includes(w)).length;
  const td = dn.filter(w=>title.includes(w)).length;
  if(tu>td) return "상승압력";
  if(td>tu) return "하락압력";
  return "중립";
}

function guessImportance(title) {
  const hot = ["긴급","속보","급등","급락","폭락","사상","최고","최저","충격","위기","붕괴"];
  const mid = ["상승","하락","발표","결정","승인","계약","실적","공시"];
  if(hot.some(w=>title.includes(w))) return "긴급";
  if(mid.some(w=>title.includes(w))) return "중요";
  return "일반";
}

function guessSectors(title) {
  const map = {
    "반도체":["삼성","하이닉스","반도체","HBM","칩","메모리"],
    "IT":["네이버","카카오","AI","플랫폼","소프트"],
    "자동차":["현대","기아","전기차","EV","자동차"],
    "바이오":["셀트리온","바이오","신약","FDA","의약"],
    "금융":["금리","은행","증권","보험","금융"],
    "화학":["LG화학","배터리","소재","화학"],
    "배터리":["삼성SDI","배터리","전지","에너지"],
  };
  const found = [];
  Object.entries(map).forEach(([sec, words]) => {
    if(words.some(w=>title.includes(w))) found.push(sec);
  });
  return found.slice(0,2);
}

// ── 종목별 공포탐욕 계산 ──────────────────────────────────────────────────
function calcStockFng(code) {
  const lc = liveChange(code);
  const sup = state.supplyData[code];
  const seed = code.split("").reduce((a,c)=>a+c.charCodeAt(0),0);
  const candles = genCandles(STOCKS[code].price, seed);
  const rsi = computeRSI(candles);
  const latestRsi = rsi.filter(v=>v!==null).slice(-1)[0] || 50;

  // RSI 기반 (40%)
  const rsiScore = latestRsi;

  // 등락률 기반 (30%) - 5% 이상 급등=100, -5% 이상 급락=0
  const changeScore = Math.min(100, Math.max(0, 50 + lc * 10));

  // 수급 기반 (30%)
  let supScore = 50;
  if (sup) {
    const foreignNet = sup.foreign.net;
    const instNet = sup.institution.net;
    supScore = Math.min(100, Math.max(0, 50 + (foreignNet + instNet) / 200));
  }

  const score = Math.round(rsiScore*0.4 + changeScore*0.3 + supScore*0.3);
  return { score, ...getFngColor(score), rsi: latestRsi };
}

// ── Stock Detail Modal ────────────────────────────────────────────────────
function renderModal(){
  let existing=document.getElementById("stock-modal");
  if(!state.selectedCode){if(existing)existing.remove();return;}
  const code=state.selectedCode,stock=STOCKS[code],lp=livePrice(code),lc=liveChange(code),isUp=lc>=0;
  const seed=code.split("").reduce((a,c2)=>a+c2.charCodeAt(0),0);
  const candles=genCandles(stock.price,seed),levels=computeLevels(candles),rsi=computeRSI(candles);
  const latestRsi=rsi.filter(v=>v!==null).slice(-1)[0],rsig=getRsiSignal(latestRsi);
  const chart=svgChart(candles,levels,lp,rsi);
  const w=inWatch(code);
  let html=`<div class="overlay" id="stock-modal" onclick="if(event.target===this)closeModal()"><div class="sheet">`;
  html+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:18px 18px 10px"><div><div style="font-weight:800;font-size:18px">${stock.name}</div><div style="font-size:11px;color:#3b82f6">${code} · ${stock.sector}</div></div><div style="display:flex;align-items:center;gap:10px"><div style="text-align:right"><div style="font-weight:800;font-size:18px">${fmt(lp)}원</div><div style="font-size:13px;color:${isUp?"#22c55e":"#ef4444"};font-weight:700">${isUp?"▲":"▼"} ${Math.abs(lc).toFixed(2)}%</div></div><button onclick="closeModal()" style="background:#1e2a3a;border:none;border-radius:10px;color:#94a3b8;padding:8px 12px;cursor:pointer;font-size:16px">✕</button></div></div>`;
  html+=`<div style="padding:0 18px 10px">${watchBtn(code,true)}</div>`;
  // RSI banner
  if(rsig)html+=`<div style="margin:0 12px 10px;border-radius:12px;padding:10px 14px;background:${rsig.bg};border:1px solid ${rsig.color}44;display:flex;align-items:center;justify-content:space-between"><div style="display:flex;align-items:center;gap:10px"><span style="font-size:22px">${rsig.icon}</span><div><div style="font-size:13px;font-weight:800;color:${rsig.color}">RSI ${latestRsi?.toFixed(1)} — ${rsig.label}</div><div style="font-size:11px;color:#94a3b8;margin-top:1px">${latestRsi>=70?"조정 구간 진입 주의":latestRsi>=60?"상승 모멘텀 유지":latestRsi>=40?"방향성 탐색 중":latestRsi>=30?"하락 압력 완화":"강한 과매도 구간"}</div></div></div><div style="text-align:right;flex-shrink:0"><div style="font-size:10px;color:#64748b">14일 기준</div><div style="display:inline-block;margin-top:3px;padding:3px 8px;border-radius:6px;background:${rsig.color}22;border:1px solid ${rsig.color}55;font-size:10px;color:${rsig.color};font-weight:700">${rsig.badge}</div></div></div>`;
  html+=`<div style="background:#1e2438;margin:0 12px;border-radius:12px;padding:12px 8px 8px;border:1px solid #252d42"><div style="display:flex;justify-content:space-between;align-items:center;padding:0 8px 8px"><span style="font-size:11px;color:#3b82f6;font-weight:700;letter-spacing:1px">캔들 + RSI(14)</span><div style="display:flex;gap:8px;font-size:9px"><span style="color:#ef4444">─ 저항</span><span style="color:#22c55e">─ 지지</span><span style="color:#f59e0b">─ MA10</span><span style="color:#a78bfa">─ RSI</span></div></div>${chart}</div>`;
  // S/R grid
  const srItems=[{label:"저항선 1",val:levels.resistance1,color:"#ef4444",bg:"rgba(248,113,113,0.08)"},{label:"저항선 2",val:levels.resistance2,color:"#fca5a5",bg:"rgba(248,113,113,0.05)"},{label:"지지선 1",val:levels.support1,color:"#22c55e",bg:"rgba(52,211,153,0.08)"},{label:"지지선 2",val:levels.support2,color:"#6ee7b7",bg:"rgba(52,211,153,0.05)"}];
  html+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px 12px">${srItems.map(i=>`<div style="background:${i.bg};border:1px solid ${i.color}33;border-radius:10px;padding:8px 12px"><div style="font-size:9px;color:${i.color};font-weight:700;margin-bottom:3px">${i.label}</div><div style="font-size:13px;font-weight:800;color:#e8ecf4">${fmt(i.val)}원</div><div style="font-size:9px;color:#64748b">현재 대비 ${((i.val/lp-1)*100).toFixed(1)}%</div></div>`).join("")}</div>`;
  // AI chart analysis
  html+=`<div style="margin:0 12px 12px;background:#1c2233;border-radius:12px;padding:14px;border:1px solid #252d42"><div style="font-size:11px;color:#3b82f6;font-weight:700;letter-spacing:1px;margin-bottom:8px">🤖 AI 차트 + RSI 분석</div>`;
  if(state.modalChartLoading)html+=`<div style="color:#64748b;font-size:12px;display:flex;align-items:center;gap:8px"><span style="display:inline-block;animation:spin 1s linear infinite">⚙️</span>RSI 기반 분석 중...</div>`;
  else html+=`<div style="font-size:13px;line-height:1.9;color:#c8d4e8;white-space:pre-wrap">${state.modalChartAI}</div>`;
  html+=`<button onclick="openStockModal('${code}')" style="margin-top:10px;padding:6px 14px;background:#1e2a3a;border:1px solid #2f3c5a;border-radius:8px;color:#3b82f6;font-size:11px;font-weight:700;cursor:pointer">🔄 재분석</button></div>`;
  // Supply
  html+=`<div style="margin:0 12px 12px;background:#1e2438;border-radius:12px;padding:14px;border:1px solid #252d42"><div style="font-size:11px;color:#3b82f6;font-weight:700;letter-spacing:1px;margin-bottom:10px">수급 현황</div>${supplyBars(code)}</div>`;
  html+=`<div style="padding:0 12px 32px"><button onclick="runAI('${code}');closeModal()" style="width:100%;padding:14px;background:linear-gradient(135deg,#1e3a6e,#4a7cdc);border:none;border-radius:12px;color:#fff;font-weight:700;font-size:14px;cursor:pointer">🤖 상세 AI 뉴스 분석 보기</button></div>`;
  html+=`</div></div>`;
  if(existing)existing.outerHTML=html;
  else document.body.insertAdjacentHTML("beforeend",html);
}
function closeModal(){state.selectedCode=null;const el=document.getElementById("stock-modal");if(el)el.remove();render();}

// ── Sector Modal ──────────────────────────────────────────────────────────
function renderSectorModal(){
  let existing=document.getElementById("sector-modal");
  if(!state.selectedSector){if(existing)existing.remove();return;}
  const sector=state.selectedSector,meta=SECTOR_META[sector]||{icon:"📊",color:"#3b82f6",leaders:[],roles:{},catalyst:""};
  const codes=Object.keys(STOCKS).filter(c=>STOCKS[c].sector===sector);
  const avg=codes.reduce((a,c)=>a+liveChange(c),0)/codes.length,isUp=avg>=0;
  const sorted=[...meta.leaders.filter(c=>codes.includes(c)),...codes.filter(c=>!meta.leaders.includes(c)).sort((a,b)=>liveChange(b)-liveChange(a))];
  let html=`<div class="overlay" id="sector-modal" onclick="if(event.target===this)closeSectorModal()"><div class="sheet">`;
  html+=`<div style="padding:18px 18px 0;background:${meta.color}14"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px"><div><div style="font-size:10px;color:${meta.color};font-weight:700;letter-spacing:2px;margin-bottom:4px">SECTOR DEEP DIVE</div><div style="font-size:22px;font-weight:900">${meta.icon} ${sector} 섹터</div><div style="font-size:12px;color:#94a3b8;margin-top:3px">${meta.catalyst}</div></div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px"><button onclick="closeSectorModal()" style="background:#1e2a3a;border:none;border-radius:10px;color:#94a3b8;padding:7px 12px;cursor:pointer;font-size:15px">✕</button><div style="font-size:13px;font-weight:800;color:${isUp?"#22c55e":"#ef4444"}">${isUp?"▲":"▼"} ${Math.abs(avg).toFixed(2)}% 평균</div></div></div><div style="background:${meta.color}18;border:1px solid ${meta.color}33;border-radius:10px;padding:8px 14px;margin-bottom:16px;font-size:11px;color:${meta.color};font-weight:600">💰 섹터 자금 유입 분석 중</div></div>`;
  html+=`<div style="margin:0 12px 12px;background:#1c2233;border-radius:12px;padding:14px;border:1px solid ${meta.color}33"><div style="font-size:11px;color:${meta.color};font-weight:700;letter-spacing:1px;margin-bottom:8px">🤖 AI 섹터 분석 (실시간 뉴스)</div>`;
  if(state.sectorAILoading)html+=`<div style="color:#64748b;font-size:12px;display:flex;align-items:center;gap:8px"><span style="display:inline-block;animation:spin 1s linear infinite">⚙️</span>섹터 동향 분석 중...</div>`;
  else html+=`<div style="font-size:13px;line-height:1.85;color:#c8d4e8;white-space:pre-wrap">${state.sectorAI}</div>`;
  html+=`<button onclick="openSectorModal('${sector}')" style="margin-top:10px;padding:5px 12px;background:#1e2a3a;border:1px solid ${meta.color}44;border-radius:8px;color:${meta.color};font-size:11px;font-weight:700;cursor:pointer">🔄 재분석</button></div>`;
  html+=`<div style="padding:0 12px 12px"><div style="font-size:11px;color:#64748b;font-weight:700;letter-spacing:1px;margin-bottom:10px">종목별 현황 · 탭하면 차트</div>`;
  sorted.forEach((code,idx)=>{
    const s=STOCKS[code],lp=livePrice(code),lc=liveChange(code),isStockUp=lc>=0,isLeader=meta.leaders.includes(code),role=meta.roles[code],w=inWatch(code);
    const seedC=code.split("").reduce((a,c2)=>a+c2.charCodeAt(0),0);
    html+=`<div style="background:#1c2233;border-radius:14px;margin-bottom:8px;border:1px solid ${isLeader?meta.color+"66":"#15243a"};overflow:hidden;${isLeader?`box-shadow:0 0 12px ${meta.color}18`:""}">`;
    if(isLeader)html+=`<div style="background:linear-gradient(90deg,${meta.color}22,transparent);padding:5px 14px;border-bottom:1px solid ${meta.color}33;display:flex;align-items:center;gap:6px"><span style="font-size:14px">${idx===0?"👑":"⚡"}</span><span style="font-size:10px;color:${meta.color};font-weight:800">${idx===0?"대장주":"주도주"}</span>${role?`<span style="font-size:9px;color:#94a3b8;margin-left:4px">· ${role}</span>`:""}`;
    if(isLeader)html+=`</div>`;
    html+=`<div style="display:flex;align-items:center;padding:12px 13px;cursor:pointer" onclick="closeSectorModal();openStockModal('${code}')"><div style="width:24px;height:24px;border-radius:6px;background:${isLeader?`linear-gradient(135deg,${meta.color},${meta.color}88)`:"#15243a"};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:${isLeader?"#fff":"#64748b"};margin-right:12px;flex-shrink:0">${idx+1}</div><div style="flex:1;min-width:0"><div style="font-weight:700;font-size:15px">${s.name}</div><div style="font-size:11px;color:#64748b;margin-top:1px">${code}</div><div style="margin-top:4px">${sparkline(code,70,24)}</div></div><div style="text-align:right;margin-left:8px"><div style="font-weight:800;font-size:15px">${lp.toLocaleString()}원</div><div style="font-size:13px;color:${isStockUp?"#22c55e":"#ef4444"};font-weight:700">${isStockUp?"▲":"▼"} ${Math.abs(lc).toFixed(2)}%</div>${watchBtn(code)}</div></div><div style="height:2px;background:linear-gradient(90deg,transparent,${isStockUp?isLeader?meta.color:"#22c55e":"#ef4444"},transparent)"></div></div>`;
  });
  html+=`</div><div style="height:24px"></div></div></div>`;
  if(existing)existing.outerHTML=html;
  else document.body.insertAdjacentHTML("beforeend",html);
}
function closeSectorModal(){state.selectedSector=null;const el=document.getElementById("sector-modal");if(el)el.remove();}

// ── Search overlay ────────────────────────────────────────────────────────
function openSearchOverlay(){
  document.body.insertAdjacentHTML("beforeend",`<div class="overlay" id="search-overlay" onclick="if(event.target===this)closeSearch()"><div style="background:#1c2233;border-radius:0 0 20px 20px;padding:16px;border:1px solid #252d42;border-top:none;width:100%;max-width:480px"><div style="display:flex;gap:8px;align-items:center"><input id="search-input" placeholder="종목명 또는 코드 검색..." oninput="updateSearch(this.value)" autofocus style="flex:1;background:#1a1f2e;border:1px solid #2f3c5a;border-radius:10px;padding:11px 14px;color:#e8ecf4;font-size:14px;outline:none"/><button onclick="closeSearch()" style="background:#1e2a3a;border:none;border-radius:10px;color:#94a3b8;padding:10px 14px;cursor:pointer;font-size:14px">✕</button></div></div><div id="search-results" style="flex:1;overflow-y:auto;padding:12px;width:100%;max-width:480px"></div></div>`);
  updateSearch("");
}
function closeSearch(){const el=document.getElementById("search-overlay");if(el)el.remove();}
function searchAndOpen(code){closeSearch();setTimeout(()=>openStockModal(code),100);}
function updateSearch(q){
  const codes=q.trim()?Object.entries(STOCKS).filter(([c,s])=>s.name.includes(q)||c.includes(q)).map(([c])=>c):Object.keys(STOCKS);
  let h="";
  codes.forEach(code=>{
    const s=STOCKS[code],lp=livePrice(code),lc=liveChange(code),w=inWatch(code);
    h+=`<div style="background:#1c2233;border-radius:12px;padding:13px;margin-bottom:8px;border:1px solid ${q?"#3b82f6":"#15243a"};display:flex;justify-content:space-between;align-items:center"><div style="flex:1;cursor:pointer" onclick="searchAndOpen('${code}')"><div style="font-weight:700">${s.name}</div><div style="font-size:11px;color:#64748b">${code} · ${s.sector}</div></div><div style="text-align:right;margin-right:12px"><div style="font-weight:700;font-size:14px">${lp.toLocaleString()}원</div><div style="font-size:12px;color:${lc>=0?"#22c55e":"#ef4444"}">${lc>=0?"▲":"▼"}${Math.abs(lc).toFixed(2)}%</div></div><button onclick="if(${w})removeWatch('${code}');else addWatch('${code}');render();updateSearch(document.getElementById('search-input')?.value||'')" style="background:${w?"#1e3a1a":"#1e2d4a"};border:none;border-radius:8px;color:${w?"#22c55e":"#f59e0b"};padding:8px 12px;cursor:pointer;font-size:15px;font-weight:700">${w?"✓":"＋"}</button></div>`;
  });
  const el=document.getElementById("search-results");if(el)el.innerHTML=h;
}

// ── PWA manifest inline ───────────────────────────────────────────────────
const manifest={name:"내 주식 앱",short_name:"주식앱",description:"한국 주식 실시간 트래커",start_url:".",display:"standalone",background_color:"#1e2438",theme_color:"#1e2438",orientation:"portrait",icons:[{src:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231e2438'/><text y='.9em' font-size='80'>📈</text></svg>",sizes:"192x192",type:"image/svg+xml"},{src:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231e2438'/><text y='.9em' font-size='80'>📈</text></svg>",sizes:"512x512",type:"image/svg+xml"}]};
const blob=new Blob([JSON.stringify(manifest)],{type:"application/json"});
document.getElementById("manifest-link").href=URL.createObjectURL(blob);

// ── Service Worker (offline cache) ────────────────────────────────────────
if("serviceWorker"in navigator){
  const sw=`self.addEventListener("install",e=>e.waitUntil(caches.open("v1").then(c=>c.addAll(["."]))));self.addEventListener("fetch",e=>{if(e.request.url.includes("anthropic.com"))return;e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));});`;
  const swBlob=new Blob([sw],{type:"application/javascript"});
  navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(()=>{});
}

// ── Init ──────────────────────────────────────────────────────────────────
render();
</script>
